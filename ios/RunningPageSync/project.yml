name: RunningPageSync
options:
  bundleIdPrefix: com.runningpage
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: 4AFRZJC734
packages:
  RunningPageSyncCore:
    path: RunningPageSyncCore
targets:
  RunningPageSync:
    type: application
    platform: iOS
    sources:
      - RunningPageSync/Sources
    resources:
      - RunningPageSync/Resources
    info:
      path: RunningPageSync/Resources/Info.plist
      properties:
        NSHealthShareUsageDescription: Running Page Sync reads your running workouts and routes so you can sync them to your own GitHub repository.
    entitlements:
      path: RunningPageSync/Resources/RunningPageSync.entitlements
      properties:
        com.apple.developer.healthkit: true
    dependencies:
      - package: RunningPageSyncCore
        product: RunningPageSyncCore
      - sdk: HealthKit.framework
      - sdk: CoreLocation.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.runningpage.RunningPageSync
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
  RunningPageSyncTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - RunningPageSyncTests
    dependencies:
      - target: RunningPageSync
