name: RunningPageSync
options:
  bundleIdPrefix: com.runningpage
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    MARKETING_VERSION: 1.3
    CURRENT_PROJECT_VERSION: 4
    DEVELOPMENT_TEAM: 4AFRZJC734
packages:
  RunningPageSyncCore:
    path: RunningPageSyncCore
targets:
  RunningPageSync:
    type: application
    platform: iOS
    sources:
      - RunningPageSync/Sources
    resources:
      - RunningPageSync/Resources
    info:
      path: RunningPageSync/Resources/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSHealthShareUsageDescription: Running Page Sync reads your workouts, routes, heart rate, energy, steps, and running metrics so you can sync a complete workout record to your own GitHub repository.
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    entitlements:
      path: RunningPageSync/Resources/RunningPageSync.entitlements
      properties:
        com.apple.developer.healthkit: true
    dependencies:
      - package: RunningPageSyncCore
        product: RunningPageSyncCore
      - sdk: HealthKit.framework
      - sdk: CoreLocation.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.runningpage.RunningPageSync
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        TARGETED_DEVICE_FAMILY: 1
  RunningPageSyncTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - RunningPageSyncTests
    dependencies:
      - target: RunningPageSync
